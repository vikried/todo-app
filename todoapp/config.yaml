name: Todo-App
version: "1.0.20"
slug: todoapp
description: Familien-Todo-App mit JWT-Auth, Kategorien, Listen-Vorlagen und Listen-Freigabe
url: https://github.com/vikried/todo-app
arch:
  - amd64
  - aarch64
startup: application
boot: auto
ingress: true
ingress_port: 80
panel_icon: mdi:checkbox-marked-outline
panel_title: Todo-App
panel_admin: false
watchdog: "tcp://[HOST]:80"
ports:
  80/tcp: 8099
ports_description:
  80/tcp: >-
    Optionaler Direktzugriff auf App/API (ohne Ingress-Token-Präfix) - wird
    z. B. von der todoapp-Integration in custom_components/ benötigt, die
    Listen/Kategorien/Items als Home-Assistant-Todo-Entities bereitstellt
    (nutzbar per Assist-Sprachsteuerung). Für reine Weboberflächen-Nutzung
    nicht nötig, dafür weiterhin Ingress verwenden.
options:
  db_name: tododb
  db_user: todo
  db_password: change-me
  jwt_secret: change-me-change-me-change-me-change-me
  cors_allowed_origins: ""
schema:
  db_name: str
  db_user: str
  db_password: password
  jwt_secret: password
  cors_allowed_origins: "str?"
