server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Vue Router History-Mode: alle unbekannten Pfade → index.html
    location / {
        try_files $uri $uri/ /index.html;

        # Home Assistant liefert die App über einen dynamischen Ingress-Pfad
        # (/api/hassio_ingress/<token>/) aus und schickt dafür den Header
        # X-Ingress-Path mit. vite.config.js baut relative Asset-Pfade
        # (base: './'); ohne diesen <base>-Tag würden sie sich gegen den
        # jeweils aktuellen Browser-Pfad statt gegen diesen Präfix auflösen.
        # Ohne Ingress (X-Ingress-Path fehlt) ergibt sich korrekt "/".
        sub_filter '<head>' '<head><base href="$http_x_ingress_path/">';
        sub_filter_once on;
    }

    # API-Reverse-Proxy: /api → Spring-Boot-Backend (läuft im selben Container)
    location /api {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Backend ist nur intern über dieses nginx erreichbar (nie direkt von
        # außen). Der Origin-Header variiert je nach Home-Assistant-Hostname
        # (homeassistant.local, Cloudflare-Tunnel-Domain, IP, ...) und lässt
        # sich nicht vorab in einer festen CORS-Allow-Liste pflegen. Da
        # Frontend und API für den Browser ohnehin dieselbe Origin sind,
        # Origin hier entfernen, damit Springs CORS-Prüfung gar nicht erst
        # greift statt Anfragen mit "Invalid CORS request" abzulehnen.
        proxy_set_header Origin "";
    }
}
