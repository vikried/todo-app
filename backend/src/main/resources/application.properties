# Datenbank (per Umgebungsvariablen konfigurierbar, siehe .env.example)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tododb}
spring.datasource.username=${DB_USER:todo}
spring.datasource.password=${DB_PASSWORD:todo123}

# Schema wird über Flyway-Migrationen (db/migration) verwaltet, nicht mehr automatisch generiert
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.flyway.baseline-on-migrate=true

# JWT Secret (mind. 32 Zeichen für HS256) - für Produktion per JWT_SECRET überschreiben
app.jwt.secret=${JWT_SECRET:TodoAppSecretKeyForJWTSigning2024!!SuperSecret}

# CORS: kommagetrennte Liste erlaubter Origins
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
