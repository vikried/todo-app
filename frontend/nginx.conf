server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Vue Router History-Mode: alle unbekannten Pfade → index.html
    location / {
        try_files $uri $uri/ /index.html;

        # vite.config.js baut relative Asset-Pfade (base: './'); hier fest auf
        # "/" verankern, damit sie auch bei tief verlinkten Routen
        # (z. B. /lists/5) korrekt gegen die Domain-Wurzel statt gegen den
        # aktuellen Pfad aufgelöst werden.
        sub_filter '<head>' '<head><base href="/">';
        sub_filter_once on;
    }

    # API-Reverse-Proxy: /api → Spring Boot Backend
    location /api {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
